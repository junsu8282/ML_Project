{% extends "base.html" %}

{% block content %}
    <div class="auth-wrapper wide">
        <div class="info-header">
            <a href="{{ url_for('main.logout') }}" class="home-link">❮ 홈으로</a>
            <h1>식습관 분석을 위한 정보 입력</h1>
            <p class="subtitle">정확한 분석을 위해 다음 정보를 입력해주세요 (1/2)</p>
        </div>

        <div class="step-container step-1">
            <div class="step-text-group">
                <span class="step-text active">개인정보</span>
                <span class="step-text">영양소 정보</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
        </div>
        <div class="auth-card">
            <h3>개인 정보</h3>

            <form id="infoForm">
                <div class="input-row">
                    <div class="input-group">
                        <label>나이</label>
                        <input type="number" name="age" placeholder="예: 25" required>
                    </div>
                    <div class="input-group">
                        <label>성별</label>
                        <select name="gender" required>
                            <option value="" disabled selected>선택하세요</option>
                            <option value="male">남성</option>
                            <option value="female">여성</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>키 (cm)</label>
                        <input type="number" name="height" placeholder="예: 170" step="0.1" required>
                    </div>
                    <div class="input-group">
                        <label>체중 (kg)</label>
                        <input type="number" name="weight" placeholder="예: 65" step="0.1" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>활동량</label>
                    <select name="activity" required>
                        <option value="" disabled selected>선택하세요</option>
                        <option value="1.2">매우 적음 (주로 앉아서 생활)</option>
                        <option value="1.375">가벼운 활동 (주 1~3회 운동)</option>
                        <option value="1.55">보통 활동 (주 3~5회 운동)</option>
                        <option value="1.725">적극적인 활동 (주 6~7회 운동)</option>
                        <option value="1.9">매우 적극적인 활동 (선수급 활동)</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">다음</button>
            </form>
        </div>
    </div>


<div class="help-icon">?</div>
{% endblock %}

{% block scripts %}
<script>
    // '홈으로' 링크를 클릭했을 때 저장된 데이터 삭제
    document.querySelector('.home-link').addEventListener('click', () => {
        localStorage.removeItem('physical_info'); // 저장된 신체 정보 삭제
        // 또는 전체 초기화 시: localStorage.clear();
    });

    document.getElementById('infoForm').onsubmit = function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        // 데이터 임시 저장 후 다음 단계로
        localStorage.setItem('physical_info', JSON.stringify(data));
        window.location.href = "/nutrient";
    };
</script>
{% endblock %}

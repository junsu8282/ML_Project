{% extends "base.html" %}

{% block content %}
    <div class="auth-wrapper">
        <div class="header-section">
            <div class="icon-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 6L9 17L4 12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>식습관 유형 분석</h1>
            <p class="subtitle">건강한 식습관을 위한 첫 걸음</p>
        </div>

        <div class="auth-card">
            <div class="tab-menu">
                <button id="loginTab" class="tab-btn active" onclick="switchTab('login')">로그인</button>
                <button id="registerTab" class="tab-btn" onclick="switchTab('register')">회원가입</button>
            </div>

            <form id="loginForm" class="auth-form active-form">
                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" id="loginId" name="user_id" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPw" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="submit-btn login-btn">로그인</button>
                <div class="help-links">
                    <a href="#">비밀번호를 잊으셨나요?</a>
                </div>
            </form>

            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label>새 아이디 (이메일)</label>
                    <input type="email" id="regId" name="user_id" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label>비밀번호 설정</label>
                    <input type="password" id="regPw" name="password" placeholder="4자 이상 입력" required>
                </div>
                <div class="input-group">
                    <label>비밀번호 확인</label>
                    <input type="password" id="regPwConfirm" placeholder="한 번 더 입력하세요" required>
                    <small id="pwCheckMsg" style="display: block; margin-top: 5px; font-size: 12px;"></small>
                </div>
                <button type="submit" class="submit-btn register-btn">회원가입 완료</button>
            </form>
        </div>

    <div class="footer-text">
        건강한 식습관으로 더 나은 삶을 시작하세요
    </div>
</div>

<div class="help-icon">?</div>
{% endblock %}

{% block scripts %}
<script>
    function switchTab(mode) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');

        if (mode === 'login') {
            loginForm.style.display = 'flex'; // flex로 변경하여 정렬 유지
            registerForm.style.display = 'none';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'flex'; // flex로 변경하여 정렬 유지
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
        }
    }

    // 비밀번호 실시간 체크 및 서버 전송 로직은 준수님 기존 코드 그대로 유지
    const regPw = document.getElementById('regPw');
    const regPwConfirm = document.getElementById('regPwConfirm');
    const pwCheckMsg = document.getElementById('pwCheckMsg');

    regPwConfirm.addEventListener('keyup', () => {
        if (regPw.value === regPwConfirm.value) {
            pwCheckMsg.textContent = "비밀번호가 일치합니다.";
            pwCheckMsg.style.color = "#00A669";
        } else {
            pwCheckMsg.textContent = "비밀번호가 일치하지 않습니다.";
            pwCheckMsg.style.color = "#ff4d4f";
        }
    });

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: document.getElementById('loginId').value,
                password: document.getElementById('loginPw').value
            })
        });
        if (response.ok) window.location.href = "/info";
        else alert("로그인 실패");
    };

    // 회원가입 폼 제출 로직
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();

        const id = document.getElementById('regId').value;
        const pw = document.getElementById('regPw').value;
        const pwConfirm = document.getElementById('regPwConfirm').value;

        // 1. 비밀번호 일치 확인 (클라이언트 사이드 검증)
        if (pw !== pwConfirm) {
            alert("비밀번호가 일치하지 않습니다.");
            return;
        }

        // 2. 서버 API 호출
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: id,
                password: pw
            })
        });

        const result = await response.json();

        if (response.ok) {
            alert(result.message); // "회원가입이 완료되었습니다!"
            switchTab('login');    // 가입 성공 후 로그인 탭으로 자동 이동
        } else {
            alert(result.message || "회원가입 실패");
        }
    };
</script>
{% endblock %}
